name: "✍️ Create a Task"
description: Create a new task.
type: "task"
labels: ["Type/Task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what needs to be done.
    validations:
      required: true
  - type: input
    id: plugin
    attributes:
      label: Related Plugin / Skill
      description: Plugin or skill this task is scoped to, if any.
    validations:
      required: false
