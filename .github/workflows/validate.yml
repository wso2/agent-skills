name: Validate Skills & Plugins

on:
  pull_request:
    branches: [main]
    paths:
      - "plugins/**"
      - ".claude-plugin/**"
      - ".github/workflows/validate.yml"
      - ".github/scripts/**"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate skills & manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate skills, plugin.json, and marketplace.json
        run: node .github/scripts/validate-skills.js

      - name: Check bundled script syntax
        run: .github/scripts/check-script-syntax.sh
